<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aahar — Profit Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      color: #2d2d2d;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      color: #e07b39;
      letter-spacing: 1px;
    }

    header p {
      color: #888;
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 20px;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      border-bottom: 2px solid #fde8d3;
      padding-bottom: 8px;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field-row label {
      flex: 1;
      font-size: 0.92rem;
      color: #444;
    }

    .field-row input {
      width: 140px;
      padding: 8px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      text-align: right;
      transition: border-color 0.2s;
      background: #fafafa;
    }

    .field-row input:focus {
      outline: none;
      border-color: #e07b39;
      background: white;
    }

    .field-row .unit {
      width: 36px;
      color: #888;
      font-size: 0.85rem;
    }

    /* Items table */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .items-table th {
      text-align: left;
      padding: 6px 8px;
      color: #888;
      font-weight: 500;
      border-bottom: 1px solid #eee;
    }

    .items-table td {
      padding: 6px 8px;
    }

    .items-table td input {
      width: 100%;
      padding: 6px 8px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.88rem;
      background: #fafafa;
    }

    .items-table td input:focus {
      outline: none;
      border-color: #e07b39;
      background: white;
    }

    .items-table tr:hover td input { background: white; }

    .btn-add {
      margin-top: 10px;
      padding: 7px 16px;
      background: #fde8d3;
      color: #e07b39;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .btn-add:hover { background: #fbd4b0; }

    .btn-remove {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 4px;
    }

    .btn-remove:hover { color: #e05555; }

    /* Results */
    .results {
      max-width: 680px;
      margin: 0 auto 24px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .result-box {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px;
      text-align: center;
    }

    .result-box .label {
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .result-box .value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .result-box.revenue .value  { color: #2a9d8f; }
    .result-box.cost    .value  { color: #e07b39; }
    .result-box.profit  .value  { color: #2a9d8f; }
    .result-box.profit.loss .value { color: #e05555; }
    .result-box.margin  .value  { color: #555; }

    .result-box .sub {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 4px;
    }

    .btn-calc {
      display: block;
      width: 100%;
      max-width: 680px;
      margin: 0 auto 20px;
      padding: 14px;
      background: #e07b39;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s;
    }

    .btn-calc:hover { background: #c9622a; }

    /* History */
    .history-list {
      list-style: none;
    }

    .history-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.88rem;
    }

    .history-list li:last-child { border-bottom: none; }

    .history-list .h-date { color: #aaa; font-size: 0.78rem; }
    .history-list .h-profit { font-weight: 700; }
    .history-list .h-profit.pos { color: #2a9d8f; }
    .history-list .h-profit.neg { color: #e05555; }

    .empty-history { color: #bbb; font-size: 0.88rem; text-align: center; padding: 16px 0; }

    .btn-clear {
      background: none;
      border: 1px solid #eee;
      color: #ccc;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      float: right;
    }

    .btn-clear:hover { color: #e05555; border-color: #e05555; }
  </style>
</head>
<body>

<header>
  <h1>Aahar</h1>
  <p>Food Business Profit Calculator</p>
</header>

<!-- Revenue Section -->
<div class="card">
  <h2>Revenue (Sales)</h2>
  <table class="items-table" id="revenue-table">
    <thead>
      <tr>
        <th style="width:40%">Item</th>
        <th>Price ($)</th>
        <th>Qty Sold</th>
        <th>Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="revenue-body"></tbody>
  </table>
  <button class="btn-add" onclick="addRow('revenue')">+ Add Item</button>
</div>

<!-- Cost Section -->
<div class="card">
  <h2>Costs & Expenses</h2>
  <table class="items-table" id="cost-table">
    <thead>
      <tr>
        <th style="width:40%">Expense</th>
        <th colspan="2">Amount ($)</th>
        <th>Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="cost-body"></tbody>
  </table>
  <button class="btn-add" onclick="addRow('cost')">+ Add Expense</button>
</div>

<!-- Calculate Button -->
<button class="btn-calc" onclick="calculate()">Calculate Profit</button>

<!-- Results -->
<div class="results">
  <div class="result-grid">
    <div class="result-box revenue">
      <div class="label">Total Revenue</div>
      <div class="value" id="res-revenue">$0</div>
    </div>
    <div class="result-box cost">
      <div class="label">Total Costs</div>
      <div class="value" id="res-cost">$0</div>
    </div>
    <div class="result-box profit" id="res-profit-box">
      <div class="label" id="res-profit-label">Net Profit</div>
      <div class="value" id="res-profit">$0</div>
      <div class="sub" id="res-profit-sub"></div>
    </div>
    <div class="result-box margin">
      <div class="label">Profit Margin</div>
      <div class="value" id="res-margin">0%</div>
      <div class="sub">of revenue</div>
    </div>
  </div>
</div>

<!-- History -->
<div class="card" style="max-width:680px;margin:0 auto 32px;">
  <h2>
    Saved Sessions
    <button class="btn-clear" onclick="clearHistory()">Clear all</button>
  </h2>
  <ul class="history-list" id="history-list">
    <li class="empty-history">No sessions saved yet. Calculate and save a session to track over time.</li>
  </ul>
  <div style="margin-top:14px;">
    <button class="btn-add" onclick="saveSession()">Save this session</button>
  </div>
</div>

<script>
  // ---- Row management ----

  function createRevenueRow(name = '', price = '', qty = '') {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="e.g. Biryani" value="${name}" oninput="updateRowTotal(this)"/></td>
      <td><input type="number" min="0" placeholder="0" value="${price}" oninput="updateRowTotal(this)"/></td>
      <td><input type="number" min="0" placeholder="0" value="${qty}" oninput="updateRowTotal(this)"/></td>
      <td class="row-total" style="font-weight:600;color:#2a9d8f;white-space:nowrap;">$0</td>
      <td><button class="btn-remove" onclick="removeRow(this)">×</button></td>
    `;
    updateRowTotalFromRow(tr);
    return tr;
  }

  function createCostRow(name = '', amount = '') {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="e.g. Raw materials" value="${name}" oninput="updateRowTotal(this)"/></td>
      <td colspan="2"><input type="number" min="0" placeholder="0" value="${amount}" oninput="updateRowTotal(this)"/></td>
      <td class="row-total" style="font-weight:600;color:#e07b39;white-space:nowrap;">$0</td>
      <td><button class="btn-remove" onclick="removeRow(this)">×</button></td>
    `;
    updateRowTotalFromRow(tr, 'cost');
    return tr;
  }

  function addRow(type) {
    const tbody = document.getElementById(type + '-body');
    tbody.appendChild(type === 'revenue' ? createRevenueRow() : createCostRow());
  }

  function removeRow(btn) {
    btn.closest('tr').remove();
  }

  function updateRowTotal(input) {
    const tr = input.closest('tr');
    const type = tr.closest('tbody').id === 'revenue-body' ? 'revenue' : 'cost';
    updateRowTotalFromRow(tr, type);
  }

  function updateRowTotalFromRow(tr, type) {
    const inputs = tr.querySelectorAll('input[type="number"]');
    let total = 0;
    if (type === 'cost') {
      total = parseFloat(inputs[0]?.value) || 0;
    } else {
      const price = parseFloat(inputs[0]?.value) || 0;
      const qty   = parseFloat(inputs[1]?.value) || 0;
      total = price * qty;
    }
    const cell = tr.querySelector('.row-total');
    if (cell) cell.textContent = '$' + fmt(total);
  }

  function sumTable(tbodyId) {
    let total = 0;
    const rows = document.querySelectorAll('#' + tbodyId + ' tr');
    rows.forEach(tr => {
      const inputs = tr.querySelectorAll('input[type="number"]');
      if (tbodyId === 'cost-body') {
        total += parseFloat(inputs[0]?.value) || 0;
      } else {
        const price = parseFloat(inputs[0]?.value) || 0;
        const qty   = parseFloat(inputs[1]?.value) || 0;
        total += price * qty;
      }
    });
    return total;
  }

  // ---- Calculate ----

  function calculate() {
    const revenue = sumTable('revenue-body');
    const cost    = sumTable('cost-body');
    const profit  = revenue - cost;
    const margin  = revenue > 0 ? (profit / revenue * 100) : 0;

    document.getElementById('res-revenue').textContent = '$' + fmt(revenue);
    document.getElementById('res-cost').textContent    = '$' + fmt(cost);
    document.getElementById('res-profit').textContent  = '$' + fmt(Math.abs(profit));
    document.getElementById('res-margin').textContent  = margin.toFixed(1) + '%';

    const profitBox = document.getElementById('res-profit-box');
    const profitLbl = document.getElementById('res-profit-label');
    const profitSub = document.getElementById('res-profit-sub');

    if (profit >= 0) {
      profitBox.classList.remove('loss');
      profitLbl.textContent = 'Net Profit';
      profitSub.textContent = 'Great job!';
    } else {
      profitBox.classList.add('loss');
      profitLbl.textContent = 'Net Loss';
      profitSub.textContent = 'Costs exceed revenue';
    }

    // scroll to results
    profitBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ---- History ----

  function saveSession() {
    const revenue = sumTable('revenue-body');
    const cost    = sumTable('cost-body');
    const profit  = revenue - cost;

    if (revenue === 0 && cost === 0) {
      alert('Add some revenue or costs first before saving.');
      return;
    }

    const sessions = getHistory();
    sessions.unshift({
      date: new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }),
      revenue,
      cost,
      profit
    });
    localStorage.setItem('aahar_sessions', JSON.stringify(sessions.slice(0, 20)));
    renderHistory();
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('aahar_sessions')) || []; }
    catch { return []; }
  }

  function clearHistory() {
    if (confirm('Clear all saved sessions?')) {
      localStorage.removeItem('aahar_sessions');
      renderHistory();
    }
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const sessions = getHistory();
    if (sessions.length === 0) {
      list.innerHTML = '<li class="empty-history">No sessions saved yet. Calculate and save a session to track over time.</li>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <li>
        <div>
          <div style="font-weight:500">${s.date}</div>
          <div class="h-date">Revenue $${fmt(s.revenue)} &nbsp;|&nbsp; Costs $${fmt(s.cost)}</div>
        </div>
        <div class="h-profit ${s.profit >= 0 ? 'pos' : 'neg'}">
          ${s.profit >= 0 ? '+' : '-'}$${fmt(Math.abs(s.profit))}
        </div>
      </li>
    `).join('');
  }

  // ---- Helpers ----

  function fmt(n) {
    return Number(n.toFixed(2)).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ---- Init ----

  // Seed with a couple of example rows
  const rb = document.getElementById('revenue-body');
  rb.appendChild(createRevenueRow('Burger', '8.50', ''));
  rb.appendChild(createRevenueRow('Coffee', '3.00', ''));
  rb.appendChild(createRevenueRow());

  const cb = document.getElementById('cost-body');
  cb.appendChild(createCostRow('Raw Materials', ''));
  cb.appendChild(createCostRow('Labour', ''));
  cb.appendChild(createCostRow('Rent / Utilities', ''));
  cb.appendChild(createCostRow());

  renderHistory();
</script>
</body>
</html>
